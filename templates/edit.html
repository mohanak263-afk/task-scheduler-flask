<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task | Task Scheduler</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>

    <h1>✏️ Edit Task</h1>

    <p>Update your task details</p>

</header>

<section class="form-section">

    <h2>Edit Task</h2>

    <form action="/update/{{ index }}" method="POST">

        <input
            type="text"
            name="title"
            value="{{ task.title }}"
            required>

        <textarea
            name="description"
            required>{{ task.description }}</textarea>

        <select name="priority">

            <option value="High"
            {% if task.priority=="High" %}selected{% endif %}>
                High
            </option>

            <option value="Medium"
            {% if task.priority=="Medium" %}selected{% endif %}>
                Medium
            </option>

            <option value="Low"
            {% if task.priority=="Low" %}selected{% endif %}>
                Low
            </option>

        </select>

        <input
            type="date"
            name="date"
            value="{{ task.date }}"
            required>

        <button type="submit">
            Update Task
        </button>

    </form>

    <br>

    <a href="/" class="back-btn">
        ← Back to Dashboard
    </a>

</section>

</body>
</html>
